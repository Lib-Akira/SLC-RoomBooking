<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม SLC Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-dark: #2d3748;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --card-radius: 16px;
        }

        body { 
            background-color: #f4f7f6; 
            font-family: 'Sarabun', sans-serif; 
            color: var(--text-dark);
            background-image: radial-gradient(#2a52980a 1px, transparent 0);
            background-size: 20px 20px;
        }

        .header-banner { 
            background: var(--primary-gradient); 
            color: white; 
            padding: 40px 30px; 
            border-radius: var(--card-radius); 
            margin-bottom: 35px; 
            box-shadow: 0 12px 35px rgba(30, 60, 114, 0.18);
            position: relative;
            overflow: hidden;
        }
        .header-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 260px;
            height: 260px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .card { 
            border: none; 
            box-shadow: var(--card-shadow); 
            border-radius: var(--card-radius); 
            background: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
        }

        .card-title-custom {
            font-size: 1.22rem;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-label {
            font-weight: 500;
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3.5px rgba(42, 82, 152, 0.12);
        }

        .btn-modern {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(42, 82, 152, 0.2);
        }
        .btn-modern:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(42, 82, 152, 0.28);
            color: white;
        }
        .btn-modern:disabled {
            background: #cbd5e1;
            box-shadow: none;
            transform: none;
        }

        .filter-wrapper {
            background-color: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            margin-bottom: 20px;
        }

        .table-modern {
            vertical-align: middle;
        }
        .table-modern thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
            letter-spacing: 0.3px;
        }
        .table-modern tbody td {
            padding: 15px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.93rem;
        }

        .building-tag {
            font-size: 0.76rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .tag-sl { background-color: #e0f2fe; color: #0369a1; }
        .tag-sb { background-color: #fef3c7; color: #b45309; }
