<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม SLC Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-dark: #2d3748;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --card-radius: 16px;
        }

        body { 
            background-color: #f4f7f6; 
            font-family: 'Sarabun', sans-serif; 
            color: var(--text-dark);
            background-image: radial-gradient(#2a52980a 1px, transparent 0);
            background-size: 20px 20px;
        }

        .header-banner { 
            background: var(--primary-gradient); 
            color: white; 
            padding: 40px 30px; 
            border-radius: var(--card-radius); 
            margin-bottom: 35px; 
            box-shadow: 0 12px 35px rgba(30, 60, 114, 0.18);
            position: relative;
            overflow: hidden;
        }
        .header-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 260px;
            height: 260px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .card { 
            border: none; 
            box-shadow: var(--card-shadow); 
            border-radius: var(--card-radius); 
            background: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
        }

        .card-title-custom {
            font-size: 1.22rem;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-label {
            font-weight: 500;
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3.5px rgba(42, 82, 152, 0.12);
        }

        .btn-modern {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(42, 82, 152, 0.2);
        }
        .btn-modern:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(42, 82, 152, 0.28);
            color: white;
        }
        .btn-modern:disabled {
            background: #cbd5e1;
            box-shadow: none;
            transform: none;
        }

        .filter-wrapper {
            background-color: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            margin-bottom: 20px;
        }

        .table-modern {
            vertical-align: middle;
        }
        .table-modern thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
            letter-spacing: 0.3px;
        }
        .table-modern tbody td {
            padding: 15px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.93rem;
        }

        .building-tag {
            font-size: 0.76rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .time-pill {
            font-weight: 600;
            color: #2a5298;
            background: #f0f4f8;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.86rem;
            display: inline-block;
         }
        
        .building-tag.tag-sl {
            background: linear-gradient(135deg, #56CCF2 0%, #2F80ED 100%) !important; 
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 2px 6px rgba(78, 84, 200, 0.2);
        }

        .building-tag.tag-sb {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%) !important; 
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 2px 6px rgba(17, 153, 142, 0.2);
        }

        /* คอนเทนเนอร์ของหัวตาราง และ ทุกๆ แถวข้อมูล */
.booking-header, .booking-row {
    display: flex;
    align-items: center; /* จัดให้วัตถุอยู่กึ่งกลางแนวตั้ง */
    padding: 12px 16px;
}

/* กำหนดความกว้างคอลัมน์เป็น % หรือ flex-basis ให้ตรงกัน */
.col-room {
    flex: 0 0 35%; /* คอลัมน์ห้องประชุมเอาไป 35% */
}

.col-time {
    flex: 0 0 25%; /* คอลัมน์เวลาเอาไป 25% */
    text-align: center;
}

.col-user {
    flex: 0 0 32%; /* คอลัมน์ข้อมูลผู้จองเอาไป 32% */
}

.col-action {
    flex: 0 0 8%;  /* คอลัมน์ปุ่มลบเอาไป 8% */
    text-align: right;
}
    </style>
</head>
<body>
<div class="container py-4">
    <div class="header-banner text-center">
        <h2 class="fw-bold mb-2"><i class="fa-solid fa-hotel me-2"></i>ระบบจองห้องประชุม SLC Library</h2>
        <p class="mb-0 opacity-75">SLC Library วิทยาลัยเซนต์หลุยส์ (Saint Louis College)</p>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="card-title-custom">
                    <i class="fa-solid fa-pen-to-square text-primary"></i> กรอกรายละเอียดการจอง
                </div>
                <form id="bookingForm">
                    <div class="mb-3">
                        <label class="form-label">🏢 เลือกอาคารที่ต้องการใช้งาน</label>
                        <select class="form-select" id="building" required onchange="updateRoomsAndTimes()">
                            <option value="">-- กรุณาเลือกอาคาร --</option>
                            <option value="Saint Louis">อาคาร Saint Louis (ฝั่งโรงพยาบาล) [10.00-19.00 น.]</option>
                            <option value="Saint Benedict">อาคาร Saint Benedict (ฝั่งอาคารเรียน) [08.00-17.00 น.]</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">🚪 เลือกห้องประชุม</label>
                        <select class="form-select" id="room" required disabled>
                            <option value="">-- กรุณาเลือกอาคารก่อน --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">📅 วันที่ต้องการจอง</label>
                        <input type="text" class="form-control" id="bookingDate" placeholder="คลิกเลือกวันที่..." required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">⏰ เวลาเริ่มต้น</label>
                            <select class="form-select" id="startTime" required disabled onchange="validateTimeSlot()"></select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">⏰ เวลาสิ้นสุด</label>
                            <select class="form-select" id="endTime" required disabled onchange="validateTimeSlot()"></select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">👤 ชื่อผู้จอง / รหัสประจำตัว</label>
                        <input type="text" class="form-control" id="requester" placeholder="ตัวอย่าง: นายโซล่าร์ 100xxx" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">🎓 Status ผู้ใช้งาน</label>
                        <select class="form-select" id="userStatus" required onchange="updateDepartmentOptions()">
                            <option value="">-- กรุณาเลือกสถานะ --</option>
                            <option value="นักศึกษา">นักศึกษา</option>
                            <option value="อาจารย์">อาจารย์</option>
                            <option value="บุคลากร">บุคลากร</option>
                        </select>
                    </div>

                    <div class="mb-3" id="departmentWrapper" style="display: none;">
                        <label class="form-label" id="departmentLabel">📋 คณะ / หน่วยงาน</label>
                        <select class="form-select" id="departmentSelect" style="display: none;">
                            <option value="">-- กรุณาเลือกคณะ --</option>
                        </select>
                        <input type="text" class="form-control" id="departmentInput" placeholder="ระบุชื่อแผนก/ฝ่าย เช่น ฝ่ายการเงิน, สำนักอธิการบดี" style="display: none;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">👥 จำนวนผู้เข้าใช้งาน (คน)</label>
                        <input type="number" class="form-control" id="attendees" min="1" max="50" placeholder="ระบุจำนวนคน" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">📝 วัตถุประสงค์การใช้งาน</label>
                        <textarea class="form-control" id="purpose" rows="2" placeholder="ระบุหัวข้อประชุม/กิจกรรมสัมมนา"></textarea>
                    </div>

                    <button type="submit" class="btn btn-modern w-100" id="submitBtn">
                        <i class="fa-solid fa-paper-plane me-2"></i>ส่งข้อมูลการจอง
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                    <div class="card-title-custom mb-0 border-0 pb-0">
                        <i class="fa-solid fa-calendar-check text-success"></i> ตรวจสอบตารางการจอง
                    </div>
                </div>
                
                <div class="filter-wrapper">
                    <div class="row g-2 align-items-center">
                        <div class="col-12 col-md-auto mb-1 mb-md-0">
                            <span class="text-muted small fw-bold text-nowrap">
                                <i class="fa-solid fa-filter me-1"></i> ตัวกรองข้อมูล:
                            </span>
                        </div>
                        <div class="col-12 col-sm-6 col-md-auto">
                            <div class="d-flex align-items-center gap-2">
                                <label for="filterDate" class="text-muted small fw-bold text-nowrap">วันที่:</label>
                                <input type="text" class="form-control form-control-sm bg-white w-100" id="filterDate" placeholder="วว/ดด/ปปปป">
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-md-auto">
                            <div class="d-flex align-items-center gap-2">
                                <label for="filterBuilding" class="text-muted small fw-bold text-nowrap">อาคาร:</label>
                                <select class="form-select form-select-sm w-100" id="filterBuilding" onchange="updateFilterRooms()" style="padding-right: 30px;">
                                    <option value="">-- ทั้งหมด --</option>
                                    <option value="Saint Louis">Saint Louis</option>
                                    <option value="Saint Benedict">Saint Benedict</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-md-auto d-none" id="filterRoomWrapper">
                            <div class="d-flex align-items-center gap-2">
                                <label for="filterRoom" class="text-muted small fw-bold text-nowrap">ห้อง:</label>
                                <select class="form-select form-select-sm w-100" id="filterRoom" onchange="filterBookings()" style="padding-right: 30px;">
                                    <option value="">-- ทั้งหมด --</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-modern table-hover">
                        <thead>
                            <tr>
                                <th>อาคาร / ห้องประชุม</th>
                                <th style="width: 135px;">ช่วงเวลา</th>
                                <th>ผู้รับสิทธิ์จอง</th>
                            </tr>
                        </thead>
                        <tbody id="bookingTableBody">
                            <tr><td colspan="3" class="text-center text-muted py-4"><i class="fa-solid fa-spinner fa-spin me-2"></i>กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDSTAZ097LZcya3VfwHOigdPEzboHnYYVOMGkpAz-X66UQEfg7BpdkRTWuIf5Wxc9MYw/exec";

    const rooms = {
        "Saint Louis": ["Conference Room 1", "Conference Room 2", "Conference Room 3", "Mini Theater Room", "Research Room"],
        "Saint Benedict": ["Conference Room 1", "Conference Room 2", "Multiple Purpose Room"]
    };

    let allBookings = []; 
    let fpBookingInstance, fpFilterInstance; 

    function generateTimeOptions(startHour, endHour) {
        let options = [];
        for (let h = startHour; h <= endHour; h++) {
            let hourStr = h.toString().padStart(2, '0');
            options.push(`${hourStr}:00`);
            if (h !== endHour) options.push(`${hourStr}:30`);
        }
        return options;
    }

    function updateRoomsAndTimes() {
        const building = document.getElementById("building").value;
        const roomSelect = document.getElementById("room");
        const startSelect = document.getElementById("startTime");
        const endSelect = document.getElementById("endTime");

        roomSelect.innerHTML = '<option value="">-- เลือกห้อง --</option>';
        if (!building) {
            roomSelect.disabled = startSelect.disabled = endSelect.disabled = true;
            return;
        }

        rooms[building].forEach(r => {
            roomSelect.innerHTML += `<option value="${r}">${r}</option>`;
        });
        roomSelect.disabled = false;

        let timeOpts = building === "Saint Louis" ? generateTimeOptions(10, 19) : generateTimeOptions(8, 17);
        
        startSelect.innerHTML = '<option value="">-- เริ่ม --</option>';
        endSelect.innerHTML = '<option value="">-- สิ้นสุด --</option>';
        
        timeOpts.forEach(t => {
            startSelect.innerHTML += `<option value="${t}">${t}</option>`;
            endSelect.innerHTML += `<option value="${t}">${t}</option>`;
        });
        
        startSelect.disabled = endSelect.disabled = false;
    }

    function updateDepartmentOptions() {
        const status = document.getElementById("userStatus").value;
        const wrapper = document.getElementById("departmentWrapper");
        const selectField = document.getElementById("departmentSelect");
        const inputField = document.getElementById("departmentInput");
        const label = document.getElementById("departmentLabel");

        selectField.required = false;
        inputField.required = false;
        
        wrapper.style.display = "none";
        selectField.style.display = "none";
        inputField.style.display = "none";
        
        if (!status) return;

        wrapper.style.display = "block"; 

        if (status === "นักศึกษา") {
            label.innerHTML = "📋 คณะที่สังกัด";
            selectField.innerHTML = `
                <option value="">-- กรุณาเลือกคณะ --</option>
                <option value="คณะพยาบาลศาสตร์">คณะพยาบาลศาสตร์</option>
                <option value="คณะจิตวิทยา">คณะจิตวิทยา</option>
                <option value="คณะกายภาพบำบัด">คณะกายภาพบำบัด</option>
            `;
            selectField.style.display = "block";
            selectField.required = true;
        } else if (status === "อาจารย์") {
            label.innerHTML = "📋 คณะ / สำนักวิชาที่สังกัด";
            selectField.innerHTML = `
                <option value="">-- กรุณาเลือกคณะ/สำนักวิชา --</option>
                <option value="คณะพยาบาลศาสตร์">คณะพยาบาลศาสตร์</option>
                <option value="คณะจิตวิทยา">คณะจิตวิทยา</option>
                <option value="คณะกายภาพบำบัด">คณะกายภาพบำบัด</option>
                <option value="สำนักวิชาศึกษาทั่วไป">สำนักวิชาศึกษาทั่วไป</option>
            `;
            selectField.style.display = "block";
            selectField.required = true;
        } else if (status === "บุคลากร") {
            label.innerHTML = "🏢 แผนก / ฝ่ายงานที่สังกัด";
            inputField.style.display = "block";
            inputField.required = true;
            inputField.value = "";
        }
    }
        
    function validateTimeSlot() {
        const start = document.getElementById("startTime").value;
        const end = document.getElementById("endTime").value;
        const submitBtn = document.getElementById("submitBtn");

        if (start && end) {
            let [sH, sM] = start.split(':').map(Number);
            let [eH, eM] = end.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);

            if (diff <= 0) {
                Swal.fire({ title: 'ข้อผิดพลาดเกี่ยวกับเวลา', text: 'เวลาสิ้นสุดต้องอยู่หลังเวลาเริ่มต้นครับ', icon: 'warning', confirmButtonColor: '#2a5298' });
                submitBtn.disabled = true;
            } else if (diff > 120) {
                Swal.fire({ title: 'เงื่อนไขการใช้ห้อง', text: '⚠️ ขอใช้งานห้องประชุมได้ครั้งละไม่เกิน 2 ชั่วโมงต่อคน', icon: 'info', confirmButtonColor: '#2a5298' });
                submitBtn.disabled = true;
            } else {
                submitBtn.disabled = false;
            }
        }
    }

    function timeToMinutes(timeStr) {
        if (!timeStr) return 0;
        var parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function loadBookings() {
        const filterDateInput = document.getElementById("filterDate");
        const selectedDate = fpFilterInstance && fpFilterInstance.selectedDates.length > 0 
            ? filterDateInput.value 
            : new Date().toLocaleDateString('sv-SE');
        
        if(fpFilterInstance && fpFilterInstance.selectedDates.length === 0) {
            fpFilterInstance.setDate(selectedDate);
        }

        const selectedBuilding = document.getElementById("filterBuilding").value;
        const selectedRoom = document.getElementById("filterRoom") ? document.getElementById("filterRoom").value : "";
        const tbody = document.getElementById("bookingTableBody");
        
        tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-4"><i class="fa-solid fa-spinner fa-spin me-2"></i>กำลังโหลดข้อมูล...</td></tr>`;

        fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            allBookings = data; 

            // นำ Logic การกรองข้อมูลมารวมไว้ตรงนี้
            const filteredData = allBookings.filter(b => {
                if (!b.date) return false;
                const bDateStr = b.date.split('T')[0]; // ดึงเฉพาะรูปแบบ YYYY-MM-DD ตรงๆ
                const matchDate = bDateStr === selectedDate;
                const matchBuilding = selectedBuilding === "" || b.building === selectedBuilding;
                const matchRoom = selectedRoom === "" || b.room === selectedRoom;

                return matchDate && matchBuilding && matchRoom;
            });

            // เรียงลำดับเวลาจากเช้าไปเย็น
            filteredData.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

            tbody.innerHTML = "";

            if (filteredData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" class="text-center text-muted py-5">
                            <i class="fa-regular fa-folder-open d-block mb-2 opacity-50" style="font-size: 2.2rem; color: #94a3b8;"></i>
                            ไม่พบข้อมูลการจองตามเงื่อนไขที่เลือกในวันนี้ครับ
                        </td>
                    </tr>`;
                return;
            }

            filteredData.forEach(b => {
                const isSL = b.building === "Saint Louis";
                const tagClass = isSL ? "tag-sl" : "tag-sb";
                const displayName = isSL ? "Saint Louis" : "Saint Benedict";

                const customTagStyle = isSL 
                ? "background: linear-gradient(135deg, #56CCF2, #2F80ED) !important; color: #ffffff !important; border: none;" 
                : "background: linear-gradient(135deg, #11998e, #38ef7d) !important; color: #ffffff !important; border: none;";

                // จัดการเรื่องเครื่องหมาย ' ป้องกันไม่ให้ JavaScript Syntax พังตอนกดลบ
                const safeRequester = b.requester.replace(/'/g, "\\'");
                const safeRoom = b.room.replace(/'/g, "\\'");

                // ✅ ปรับปรุงโครงสร้างคอลัมน์ภายใน <td> ใหม่ทั้งหมด โดยบังคับความกว้างด้วยสไตล์พิกเซล/เปอร์เซ็นต์ที่แน่นอน
                tbody.innerHTML += `
                    <tr class="hover-bg-light" style="vertical-align: middle;">
                        <td style="padding: 14px 16px; width: 40%; min-width: 160px;">
                            <span class="building-tag ${tagClass} mb-1" style="${customTagStyle}">${displayName}</span>
                            <div class="fw-bold text-dark" style="font-size:0.95rem; line-height: 1.3;">${b.room}</div>
                        </td>
                        <td style="padding: 14px 16px; width: 25%; min-width: 120px;">
                            <span class="time-pill" style="white-space: nowrap;"><i class="fa-regular fa-clock me-1"></i>${b.startTime} - ${b.endTime}</span>
                        </td>
                        <td style="padding: 14px 16px; width: 35%; min-width: 180px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px;">
                                <div style="min-width: 0; flex: 1; line-height: 1.4;">
                                    <div class="fw-semibold text-dark text-truncate" style="font-size:0.92rem;" title="${b.requester}">${b.requester}</div>
                                    <small class="text-muted d-block" style="font-size:0.8rem; margin-top: 2px;">
                                        <span class="badge bg-secondary bg-opacity-10 text-secondary px-1.5 py-0.5 rounded" style="font-size: 0.72rem; font-weight: 500;">
                                            ${b.userStatus || '-'}
                                        </span>
                                    </small>
                                </div>
                                <button class="btn btn-sm btn-outline-danger border-0 rounded-circle flex-shrink-0 d-flex align-items-center justify-content-center" 
                                    style="width: 28px; height: 28px; padding: 0;"
                                    onclick="deleteBooking('${safeRequester}', '${b.date}', '${b.startTime}', '${safeRoom}')" 
                                    title="ยกเลิกการจองนี้ (เฉพาะแอดมิน)">
                                    <i class="fa-solid fa-trash-can" style="font-size: 0.85rem;"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }).catch(err => {
            console.error(err);
            tbody.innerHTML = "<tr><td colspan='3' class='text-center text-danger py-4'><i class='fa-solid fa-triangle-exclamation me-2'></i>โหลดข้อมูลระบบล้มเหลว</td></tr>";
        });
    }

    function updateFilterRooms() {
        const building = document.getElementById("filterBuilding").value;
        const roomSelect = document.getElementById("filterRoom");
        const roomWrapper = document.getElementById("filterRoomWrapper");
        
        if (!building) {
            roomSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
            roomSelect.value = "";
            roomWrapper.classList.add("d-none");
            loadBookings(); // เรียกโหลดใหม่แบบ real-time
            return;
        }
        
        roomSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
        if (rooms[building]) {
            rooms[building].forEach(r => {
                roomSelect.innerHTML += `<option value="${r}">${r}</option>`;
            });
        }
        roomWrapper.classList.remove("d-none");
        loadBookings(); // เรียกโหลดใหม่แบบ real-time
    }
        
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
        e.preventDefault();
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").innerHTML = "<i class='fa-solid fa-spinner fa-spin me-2'></i>กำลังบันทึกข้อมูล...";

        const bookingDateValue = fpBookingInstance ? fpBookingInstance.input.value : "";
        const statusValue = document.getElementById("userStatus").value;

        let deptValue = "";
        if (statusValue === "บุคลากร") {
            deptValue = document.getElementById("departmentInput").value;
        } else if (statusValue === "นักศึกษา" || statusValue === "อาจารย์") {
            deptValue = document.getElementById("departmentSelect").value;
        }

        const payload = {
            building: document.getElementById("building").value,
            room: document.getElementById("room").value,
            date: bookingDateValue, 
            startTime: document.getElementById("startTime").value,
            endTime: document.getElementById("endTime").value,
            requester: document.getElementById("requester").value,
            purpose: document.getElementById("purpose").value,
            userStatus: statusValue,
            department: deptValue,
            attendees: document.getElementById("attendees").value
        };

        fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(result => {
            if (result.status === "error") {
                Swal.fire({
                    title: 'ไม่สามารถจองได้',
                    html: result.message,
                    icon: 'warning',
                    confirmButtonColor: '#2a5298'
                });
            } else {
                Swal.fire({
                    title: 'จองสำเร็จ!',
                    text: 'โปรดติดต่อเจ้าหน้าที่ห้องสมุด SLC ก่อนเข้าใช้งาน',
                    icon: 'success',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#2a5298'
                });
                
                if (fpFilterInstance) {
                    fpFilterInstance.setDate(payload.date);
                }

                document.getElementById("bookingForm").reset();
                if(fpBookingInstance) fpBookingInstance.clear(); 
                
                document.getElementById("room").disabled = true;
                document.getElementById("startTime").disabled = true;
                document.getElementById("endTime").disabled = true;
                
                document.getElementById("departmentWrapper").style.display = "none";
                document.getElementById("departmentSelect").style.display = "none";
                document.getElementById("departmentInput").style.display = "none";

                loadBookings();
            }
        })
        .catch(err => {
            console.error(err);
            Swal.fire({
                title: 'เกิดข้อผิดพลาด!',
                text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง',
                icon: 'error',
                confirmButtonText: 'รับทราบ',
                confirmButtonColor: '#d33'
            });
        })
        .finally(() => {
            document.getElementById("submitBtn").innerHTML = "<i class='fa-solid fa-paper-plane me-2'></i>ส่งข้อมูลการจอง";
            document.getElementById("submitBtn").disabled = false;
        });
    });

    window.onload = function() {
        fpBookingInstance = flatpickr("#bookingDate", {
            dateFormat: "Y-m-d", 
            altInput: true,      
            altFormat: "d/m/Y",  
            locale: "th",            
            minDate: "today",        
            allowInput: false
        });

        fpFilterInstance = flatpickr("#filterDate", {
            dateFormat: "Y-m-d", 
            altInput: true,
            altFormat: "d/m/Y",  
            locale: "th",
            allowInput: false,
            onChange: function(selectedDates, dateStr, instance) {
                filterBookings(); 
            }
        });

        loadBookings();
    };

    function deleteBooking(requester, date, startTime, room) {
        Swal.fire({
            title: '🔒 ยืนยันการลบรายการ',
            text: 'ฟังก์ชันนี้เฉพาะเจ้าหน้าที่ห้องสมุดเท่านั้น<br>กรุณาใส่รหัสผ่านแอดมิน:',
            input: 'password', 
            inputAttributes: {
                autocapitalize: 'off',
                autocorrect: 'off'
            },
            showCancelButton: true,
            confirmButtonText: 'ยืนยันการลบ',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#d33',
            cancelButtonColor: '#64748b',
            showLoaderOnConfirm: true,
            preConfirm: (password) => {
                if (!password) {
                    Swal.showValidationMessage('กรุณากรอกรหัสผ่านครับ');
                    return false;
                }
                
                return fetch(`${SCRIPT_URL}?action=delete&password=${encodeURIComponent(password)}&requester=${encodeURIComponent(requester)}&date=${encodeURIComponent(date)}&startTime=${encodeURIComponent(startTime)}&room=${encodeURIComponent(room)}`, {
                    method: 'GET'
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(response.statusText);
                    }
                    return response.json();
                })
                .catch(error => {
                    Swal.showValidationMessage(`เกิดข้อผิดพลาด: ${error}`);
                });
            },
            allowOutsideClick: () => !Swal.isLoading()
        }).then((result) => {
            if (result.isConfirmed && result.value) {
                if (result.value.status === "success") {
                    Swal.fire({
                        title: 'ลบรายการสำเร็จ!',
                        text: 'ลบข้อมูลการจองเรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#2a5298'
                    });
                    loadBookings(); // โหลดตารางใหม่หลังจากลบสำเร็จ
                } else {
                    Swal.fire({
                        title: 'ไม่สามารถลบได้!',
                        text: result.value.message || 'รหัสผ่านไม่ถูกต้อง หรือไม่พบข้อมูล',
                        icon: 'error',
                        confirmButtonColor: '#2a5298'
                    });
                }
            }
        });
    }

    // เพิ่มฟังก์ชัน filterBookings เผื่อไว้เนื่องจากในโค้ดมีการเรียกใช้ตอนเปลี่ยนตัวกรอง
    function filterBookings() {
        loadBookings();
    }
</script>
</body>
</html>
