<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม SLC Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --text-dark: #2d3748;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --card-radius: 16px;
        }

        body { 
            background-color: #f4f7f6; 
            font-family: 'Sarabun', sans-serif; 
            color: var(--text-dark);
            background-image: radial-gradient(#2a52980a 1px, transparent 0);
            background-size: 20px 20px;
        }

        .header-banner { 
            background: var(--primary-gradient); 
            color: white; 
            padding: 40px 30px; 
            border-radius: var(--card-radius); 
            margin-bottom: 35px; 
            box-shadow: 0 12px 35px rgba(30, 60, 114, 0.18);
            position: relative;
            overflow: hidden;
        }
        .header-banner::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 260px;
            height: 260px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .card { 
            border: none; 
            box-shadow: var(--card-shadow); 
            border-radius: var(--card-radius); 
            background: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
        }

        .card-title-custom {
            font-size: 1.22rem;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-label {
            font-weight: 500;
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3.5px rgba(42, 82, 152, 0.12);
        }

        .btn-modern {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(42, 82, 152, 0.2);
        }
        .btn-modern:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(42, 82, 152, 0.28);
            color: white;
        }
        .btn-modern:disabled {
            background: #cbd5e1;
            box-shadow: none;
            transform: none;
        }

        .filter-wrapper {
            background-color: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            margin-bottom: 20px;
        }

        .table-modern {
            vertical-align: middle;
        }
        .table-modern thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
            letter-spacing: 0.3px;
        }
        .table-modern tbody td {
            padding: 15px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.93rem;
        }

        .building-tag {
            font-size: 0.76rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .tag-sl { background-color: #e0f2fe; color: #0369a1; }
        .tag-sb { background-color: #fef3c7; color: #b45309; }

        .time-pill {
            font-weight: 600;
            color: #2a5298;
            background: #f0f4f8;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.86rem;
            display: inline-block;
        /* 🔵 ปรับสีของอาคาร Saint Louis */
         }
        
        /* 🔵 ปรับ Saint Louis เป็นไล่สีน้ำเงิน-ม่วง แบบในรูปภาพ */
        .building-tag.tag-sl {
            background: linear-gradient(135deg, #56CCF2 0%, #2F80ED 100%) !important; 
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 2px 6px rgba(78, 84, 200, 0.2); /* แถมมิติเงาจาง ๆ */
}

        /* 🟢 ปรับ Saint Benedict เป็นไล่สีเขียวเข้ม-เขียวสว่าง ให้เข้าคู่กัน */
        .building-tag.tag-sb {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%) !important; 
            color: #ffffff !important;
            border: none !important;
            box-shadow: 0 2px 6px rgba(17, 153, 142, 0.2);
}
    </style>
</head>
<body>
<div class="container py-4">
    <div class="header-banner text-center">
        <h2 class="fw-bold mb-2"><i class="fa-solid fa-hotel me-2"></i>ระบบจองห้องประชุม SLC Library</h2>
        <p class="mb-0 opacity-75">SLC Library วิทยาลัยเซนต์หลุยส์ (Saint Louis College)</p>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="card-title-custom">
                    <i class="fa-solid fa-pen-to-square text-primary"></i> กรอกรายละเอียดการจอง
                </div>
                <form id="bookingForm">
                    <div class="mb-3">
                        <label class="form-label">🏢 เลือกอาคารที่ต้องการใช้งาน</label>
                        <select class="form-select" id="building" required onchange="updateRoomsAndTimes()">
                            <option value="">-- กรุณาเลือกอาคาร --</option>
                            <option value="Saint Louis">อาคาร Saint Louis (ฝั่งโรงพยาบาล) [10.00-19.00 น.]</option>
                            <option value="Saint Benedict">อาคาร Saint Benedict (ฝั่งอาคารเรียน) [08.00-17.00 น.]</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">🚪 เลือกห้องประชุม</label>
                        <select class="form-select" id="room" required disabled>
                            <option value="">-- กรุณาเลือกอาคารก่อน --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">📅 วันที่ต้องการจอง</label>
                        <input type="text" id="bookingDate" placeholder="วว/ดด/ปปปป">
                    </div>

                    <div class="row">
                    <div class="col-6 mb-3">
                    <label class="form-label">⏰ เวลาเริ่มต้น</label>
                    <select class="form-select" id="startTime" required disabled onchange="validateTimeSlot()"></select>
                </div>
                    <div class="col-6 mb-3">
                    <label class="form-label">⏰ เวลาสิ้นสุด</label>
                    <select class="form-select" id="endTime" required disabled onchange="validateTimeSlot()"></select>
                </div>
            </div>

                    <div class="mb-3">
                        <label class="form-label">👤 ชื่อผู้จอง / รหัสประจำตัว</label>
                        <input type="text" class="form-control" id="requester" placeholder="ตัวอย่าง: นายโซล่าร์ 100xxx" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">🎓 สถานะผู้ใช้งาน</label>
                        <select class="form-select" id="userStatus" required onchange="updateDepartmentOptions()">
                            <option value="">-- กรุณาเลือกสถานะ --</option>
                            <option value="นักศึกษา">นักศึกษา</option>
                            <option value="อาจารย์">อาจารย์</option>
                            <option value="บุคลากร">บุคลากร</option>
                        </select>
                    </div>

                    <div class="mb-3" id="departmentWrapper" style="display: none;">
                        <label class="form-label" id="departmentLabel">📋 คณะ / หน่วยงาน</label>
                        <select class="form-select" id="departmentSelect" style="display: none;">
                            <option value="">-- กรุณาเลือกคณะ --</option>
                        </select>
                        <input type="text" class="form-control" id="departmentInput" placeholder="ระบุชื่อแผนก/ฝ่าย เช่น ฝ่ายการเงิน, สำนักอธิการบดี" style="display: none;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">👥 จำนวนผู้เข้าใช้งาน (คน)</label>
                        <input type="number" class="form-control" id="attendees" min="1" max="50" placeholder="ระบุจำนวนคน" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">📝 วัตถุประสงค์การใช้งาน</label>
                        <textarea class="form-control" id="purpose" rows="2" placeholder="ระบุหัวข้อประชุม/กิจกรรมสัมมนา"></textarea>
                    </div>

                    <button type="submit" class="btn btn-modern w-100" id="submitBtn">
                        <i class="fa-solid fa-paper-plane me-2"></i>ส่งข้อมูลการจอง
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                    <div class="card-title-custom mb-0 border-0 pb-0">
                        <i class="fa-solid fa-calendar-check text-success"></i> ตรวจสอบตารางการจอง
                    </div>
                </div>
                
                <div class="filter-wrapper">
    <div class="row g-2 align-items-center">
        <div class="col-12 col-sm-auto">
            <span class="text-muted small fw-bold text-nowrap">
                <i class="fa-solid fa-filter me-1"></i> ตัวกรองข้อมูล:
            </span>
        </div>
        <div class="col-6 col-sm-auto d-flex align-items-center gap-2">
            <label for="filterDate" class="text-muted small fw-bold text-nowrap">วันที่:</label>
            <input type="text" class="form-control form-control-sm bg-white" id="filterDate" style="max-width: 140px;" placeholder="วว/ดด/ปปปป">
        </div>
        <div class="col-6 col-sm-auto d-flex align-items-center gap-2">
            <label for="filterBuilding" class="text-muted small fw-bold text-nowrap">อาคาร:</label>
            <select class="form-select form-select-sm" id="filterBuilding" onchange="updateFilterRooms()" style="max-width: 150px; padding-right: 30px;">
                <option value="">-- ทั้งหมด --</option>
                <option value="Saint Louis">Saint Louis</option>
                <option value="Saint Benedict">Saint Benedict</option>
            </select>
        </div>
        <div class="col-12 col-sm-auto d-flex align-items-center gap-2 d-none" id="filterRoomWrapper">
            <label for="filterRoom" class="text-muted small fw-bold text-nowrap">ห้อง:</label>
            <select class="form-select form-select-sm" id="filterRoom" onchange="filterBookings()" 
                    style="max-width: 200px;  padding-right: 30px;">
                <option value="">-- ทั้งหมด --</option>
            </select>
        </div>
    </div>
</div>

                <div class="table-responsive">
                    <table class="table table-modern table-hover">
                        <thead>
                            <tr>
                                <th>อาคาร / ห้องประชุม</th>
                                <th style="width: 135px;">ช่วงเวลา</th>
                                <th>ผู้รับสิทธิ์จอง</th>
                            </tr>
                        </thead>
                        <tbody id="bookingTableBody">
                            <tr><td colspan="3" class="text-center text-muted py-4"><i class="fa-solid fa-spinner fa-spin me-2"></i>กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDSTAZ097LZcya3VfwHOigdPEzboHnYYVOMGkpAz-X66UQEfg7BpdkRTWuIf5Wxc9MYw/exec";

    const rooms = {
        "Saint Louis": ["Conference Room 1", "Conference Room 2", "Conference Room 3", "Mini Theater Room", "Research Room"],
        "Saint Benedict": ["Conference Room 1", "Conference Room 2", "Multiple Purpose Room"]
    };

    let allBookings = []; 

    function generateTimeOptions(startHour, endHour) {
        let options = [];
        for (let h = startHour; h <= endHour; h++) {
            let hourStr = h.toString().padStart(2, '0');
            options.push(`${hourStr}:00`);
            if (h !== endHour) options.push(`${hourStr}:30`);
        }
        return options;
    }

    function updateRoomsAndTimes() {
        const building = document.getElementById("building").value;
        const roomSelect = document.getElementById("room");
        const startSelect = document.getElementById("startTime");
        const endSelect = document.getElementById("endTime");

        roomSelect.innerHTML = '<option value="">-- เลือกห้อง --</option>';
        if (!building) {
            roomSelect.disabled = startSelect.disabled = endSelect.disabled = true;
            return;
        }

        rooms[building].forEach(r => {
            roomSelect.innerHTML += `<option value="${r}">${r}</option>`;
        });
        roomSelect.disabled = false;

        let timeOpts = building === "Saint Louis" ? generateTimeOptions(10, 19) : generateTimeOptions(8, 17);
        
        startSelect.innerHTML = '<option value="">-- เริ่ม --</option>';
        endSelect.innerHTML = '<option value="">-- สิ้นสุด --</option>';
        
        timeOpts.forEach(t => {
            startSelect.innerHTML += `<option value="${t}">${t}</option>`;
            endSelect.innerHTML += `<option value="${t}">${t}</option>`;
        });
        
        startSelect.disabled = endSelect.disabled = false;
    }

    function updateDepartmentOptions() {
        const status = document.getElementById("userStatus").value;
        const wrapper = document.getElementById("departmentWrapper");
        const selectField = document.getElementById("departmentSelect");
        const inputField = document.getElementById("departmentInput");
        const label = document.getElementById("departmentLabel");

        selectField.required = false;
        inputField.required = false;
        
        wrapper.style.display = "none";
        selectField.style.display = "none";
        selectField.required = false;
        inputField.style.display = "none";
        inputField.required = false;
        
        if (!status) return;

        wrapper.style.display = "block"; 

        if (status === "นักศึกษา") {
            label.innerHTML = "📋 คณะที่สังกัด";
            selectField.innerHTML = `
                <option value="">-- กรุณาเลือกคณะ --</option>
                <option value="คณะพยาบาลศาสตร์">คณะพยาบาลศาสตร์</option>
                <option value="คณะจิตวิทยา">คณะจิตวิทยา</option>
                <option value="คณะกายภาพบำบัด">คณะกายภาพบำบัด</option>
            `;
            selectField.style.display = "block";
            selectField.required = true;
        } else if (status === "อาจารย์") {
            label.innerHTML = "📋 คณะ / สำนักวิชาที่สังกัด";
            selectField.innerHTML = `
                <option value="">-- กรุณาเลือกคณะ/สำนักวิชา --</option>
                <option value="คณะพยาบาลศาสตร์">คณะพยาบาลศาสตร์</option>
                <option value="คณะจิตวิทยา">คณะจิตวิทยา</option>
                <option value="คณะกายภาพบำบัด">คณะกายภาพบำบัด</option>
                <option value="สำนักวิชาศึกษาทั่วไป">สำนักวิชาศึกษาทั่วไป</option>
            `;
            selectField.style.display = "block";
            selectField.required = true;
        } else if (status === "บุคลากร") {
            label.innerHTML = "🏢 แผนก / ฝ่ายงานที่สังกัด";
            inputField.style.display = "block";
            inputField.required = true;
            inputField.value = "";
        }
    } // 🟢 ล็อคปีกกาปิดฟังก์ชันควบคุมแผนกตรงนี้ให้ถูกต้องแล้ว
        
    function validateTimeSlot() {
        const start = document.getElementById("startTime").value;
        const end = document.getElementById("endTime").value;
        const submitBtn = document.getElementById("submitBtn");

        if (start && end) {
            let [sH, sM] = start.split(':').map(Number);
            let [eH, eM] = end.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);

            if (diff <= 0) {
                Swal.fire({ title: 'ข้อผิดพลาดเกี่ยวกับเวลา', text: 'เวลาสิ้นสุดต้องอยู่หลังเวลาเริ่มต้นครับ', icon: 'warning', confirmButtonColor: '#2a5298' });
                submitBtn.disabled = true;
            } else if (diff > 120) {
                Swal.fire({ title: 'เงื่อนไขของสถาบัน', text: '⚠️ สามารถขอใช้งานห้องประชุมได้ครั้งละไม่เกิน 2 ชั่วโมงต่อคน', icon: 'info', confirmButtonColor: '#2a5298' });
                submitBtn.disabled = true;
            } else {
                submitBtn.disabled = false;
            }
        }
    }

    function loadBookings() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("filterDate").value = today;

        fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            allBookings = data; 
            filterBookingsByDate(); 
        }).catch(err => {
            document.getElementById("bookingTableBody").innerHTML = "<tr><td colspan='3' class='text-center text-danger py-4'><i class='fa-solid fa-triangle-exclamation me-2'></i>โหลดข้อมูลระบบล้มเหลว</td></tr>";
        });
    }

    function updateFilterRooms() {
        const building = document.getElementById("filterBuilding").value;
        const roomSelect = document.getElementById("filterRoom");
        const roomWrapper = document.getElementById("filterRoomWrapper"); // 🟢 ดึง Wrapper มาควบคุม
        
        // 🟢 กรณีที่ 1: หากไม่ได้เลือกอาคาร หรือเลือกกลับมาเป็น "-- ทั้งหมด --"
        if (!building) {
            roomSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
            roomSelect.value = ""; // เคลียร์ค่าห้องที่เคยเลือกค้างไว้
            
            roomWrapper.classList.add("d-none"); // 🟢 สั่งให้ช่องเลือกห้อง "หายไปเลย"
            
            filterBookings(); // อัปเดตตารางใหม่
            return;
        }
        
        // 🟢 กรณีที่ 2: มีการเลือกอาคารอย่างถูกต้อง
        roomSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
        
        if (rooms[building]) {
            rooms[building].forEach(r => {
                roomSelect.innerHTML += `<option value="${r}">${r}</option>`;
            });
        }
        
        roomWrapper.classList.remove("d-none"); // 🟢 เอา d-none ออก เพื่อให้ช่องเลือกห้อง "โผล่ขึ้นมา"
        
        // เมื่อเปลี่ยนอาคาร ให้ทำการกรองตารางข้อมูลอัปเดตใหม่ทันที
        filterBookings();
    }

    // 🟢 แก้ไขฟังก์ชัน loadBookings ให้เรียกตัวกรองตัวใหม่
    function loadBookings() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("filterDate").value = today;

        fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            allBookings = data; 
            filterBookings(); // เปลี่ยนมาเรียกฟังก์ชันรวมตรงนี้ครับ
        }).catch(err => {
            document.getElementById("bookingTableBody").innerHTML = "<tr><td colspan='3' class='text-center text-danger py-4'><i class='fa-solid fa-triangle-exclamation me-2'></i>โหลดข้อมูลระบบล้มเหลว</td></tr>";
        });
    }

    // 🟢 รวมศูนย์การกรองข้อมูลแบบ Multi-Filter (แทนที่ filterBookingsByDate เดิม)
    function filterBookings() {
        const selectedDate = document.getElementById("filterDate").value;
        const selectedBuilding = document.getElementById("filterBuilding").value;
        const selectedRoom = document.getElementById("filterRoom").value;
        const tbody = document.getElementById("bookingTableBody");
        tbody.innerHTML = "";

        // กรองข้อมูลพร้อมกัน 3 เงื่อนไข (วันที่ + อาคาร + ห้อง)
        const filteredData = allBookings.filter(b => {
            if (!b.date) return false;
            
            // แปลงวันที่ตรวจสอบให้ตรงกัน
            const bDateStr = new Date(b.date).toISOString().split('T')[0];
            const matchDate = bDateStr === selectedDate;
            
            // ตรวจสอบเงื่อนไขอาคาร (ถ้าเลือกทั้งหมด ให้ผ่านฉลุย)
            const matchBuilding = selectedBuilding === "" || b.building === selectedBuilding;
            
            // ตรวจสอบเงื่อนไขห้องประชุม (ถ้าเลือกทั้งหมด ให้ผ่านฉลุย)
            const matchRoom = selectedRoom === "" || b.room === selectedRoom;

            return matchDate && matchBuilding && matchRoom;
        });

        // แสดงผลลัพธ์ลงตารางเหมือนเดิม
        if (filteredData.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="3" class="text-center text-muted py-5">
                        <i class="fa-regular fa-folder-open d-block mb-2 opacity-50" style="font-size: 2.2rem; color: #94a3b8;"></i>
                        ไม่พบข้อมูลการจองตามเงื่อนไขที่เลือกในวันนี้ครับ
                    </td>
                </tr>`;
            return;
        }

        filteredData.forEach(b => {
            const isSL = b.building === "Saint Louis";
            const tagClass = isSL ? "tag-sl" : "tag-sb";
            const displayName = isSL ? "Saint Louis" : "Saint Benedict";

            const customTagStyle = isSL 
            ? "background: linear-gradient(135deg, #56CCF2, #2F80ED) !important; color: #ffffff !important; border: none;" 
            : "background: linear-gradient(135deg, #11998e, #38ef7d) !important; color: #ffffff !important; border: none;";

            tbody.innerHTML += `
                <tr style="vertical-align: middle;">
                    <td style="padding: 12px 16px; width: 40%;">
                        <span class="building-tag ${tagClass} mb-1" style="${customTagStyle}">${displayName}</span>
                        <div class="fw-bold text-dark" style="font-size:0.95rem;">${b.room}</div>
                    </td>
                    <td style="padding: 12px 16px; width: 25%;">
                    <span class="time-pill"><i class="fa-regular fa-clock me-1"></i>${b.startTime} - ${b.endTime}</span>
                    </td>
                    <td style="padding: 12px 16px; width: 35%;">
                        <div class="fw-semibold text-dark">${b.requester}</div>
                        <small class="text-muted" style="font-size:0.8rem;">${b.purpose || '-'}</small>
                    </td>
                </tr>
            `;
        });
    }
    
    // 🟢 แก้ไขปุ่ม Submit ให้ทำงานได้ถูกต้อง 100% แล้ว
   document.getElementById("bookingForm").addEventListener("submit", function(e) {

        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").innerHTML = "<i class='fa-solid fa-spinner fa-spin me-2'></i>กำลังบันทึกข้อมูล...";

        const payload = {

};

        // เปลี่ยนรูปแบบการส่งให้เข้ากับระบบ Apps Script ได้ดียิ่งขึ้น
      fetch(SCRIPT_URL, {

    window.onload = function() {
    // 1. สำหรับช่องกรอกข้อมูลการจอง (คลิกเลือกปฏิทินภาษาไทย)
    flatpickr("#date", {
        dateFormat: "Y-m-d",     // ฟอร์แมตส่งค่าให้ระบบ (ค.ศ.)
        altInput: true,          // เปิดใช้งานกล่องแสดงผลแยก
        altFormat: "d/m/Y",      // ฟอร์แมตที่จะโชว์บนหน้าเว็บ (วัน/เดือน/ปี)
        locale: "th",            // หน้าต่างปฏิทินเมนูไทย
        minDate: "today",        // ห้ามเลือกวันย้อนหลัง
        // จุดสำคัญ: ตัวนี้จะแปลงปีตอนที่ "คลิกเลือกจากปฏิทิน" ให้โชว์เป็น พ.ศ. ทันทีโดยไม่ต้องพิมพ์เอง
        onReady: function(selectedDates, dateStr, instance) {
            if (instance.altInput) {
                instance.altInput.addEventListener('keydown', (e) => e.preventDefault()); // บล็อกไม่ให้พิมพ์มือ ป้องกันการกรอกผิด
            }
        },
        formatDate: (date, format, locale) => {
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const yearBE = date.getFullYear() + 543; // เปลี่ยนเป็น พ.ศ.
            return `${day}/${month}/${yearBE}`;
        }
    });

    // 2. สำหรับช่องตัวกรองในตาราง (คลิกปุ๊บ กรองปั๊บ)
    flatpickr("#filterDate", {
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "d/m/Y",
        locale: "th",
        defaultDate: "today", 
        onReady: function(selectedDates, dateStr, instance) {
            if (instance.altInput) {
                instance.altInput.addEventListener('keydown', (e) => e.preventDefault()); // บล็อกไม่ให้พิมพ์มือ ให้จิ้มเลือกอย่างเดียว
            }
        },
        onChange: function(selectedDates, dateStr, instance) {
            // เมื่อจิ้มเปลี่ยนวันที่บนปฏิทิน ให้ทำการกรองตารางทันที
            filterBookings(); 
        },
        formatDate: (date, format, locale) => {
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const yearBE = date.getFullYear() + 543;
            return `${day}/${month}/${yearBE}`;
        }
    });

    // 3. โหลดข้อมูลตารางจองครั้งแรก
    loadBookings();
};
</script>
