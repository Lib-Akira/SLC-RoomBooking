name: "📅 จองห้องประชุม (Room Booking)"
description: "กรอกรายละเอียดเพื่อขออนุมัติจองห้องประชุม (ตึก Saint Louis / Saint Benedict)"
title: "[Booking]: "
labels: ["รอตรวจสอบ⏳"]
body:
  - type: markdown
    attributes:
      value: |
        ### ระบบจองห้องประชุม สำนักหอสมุดดิจิทัล
        ⚠️ **เงื่อนไขสำคัญ:** สามารถจองใช้งานได้ **ไม่เกิน 2 ชั่วโมง ต่อคน / ต่อวัน** เท่านั้นครับ

  - type: dropdown
    id: room
    attributes:
      label: 🚪 เลือกตึกและห้องประชุมที่ต้องการใช้งาน
      options:
        - "🏢 ตึกที่ 1 Saint Louis (ฝั่งโรงพยาบาล) - Conference Room 1"
        - "🏢 ตึกที่ 1 Saint Louis (ฝั่งโรงพยาบาล) - Conference Room 2"
        - "🏢 ตึกที่ 1 Saint Louis (ฝั่งโรงพยาบาล) - Conference Room 3"
        - "🏢 ตึกที่ 1 Saint Louis (ฝั่งโรงพยาบาล) - mini theater room"
        - "🏢 ตึกที่ 1 Saint Louis (ฝั่งโรงพยาบาล) - Research Room (ห้องวิจัย)"
        - "⛪ ตึกที่ 2 Saint Benedict - Conference Room 1"
        - "⛪ ตึกที่ 2 Saint Benedict - Conference Room 2"
        - "⛪ ตึกที่ 2 Saint Benedict - mini theater room (เปิดใช้งานเร็วๆนี้)"
        - "⛪ ตึกที่ 2 Saint Benedict - multiple purpose room"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: 📆 วันที่ต้องการจอง
      placeholder: "ตัวอย่าง: 24 มิถุนายน 2026"
    validations:
      required: true

  - type: dropdown
    id: start_time
    attributes:
      label: ⏰ 1. เลือกเวลาที่ต้องการ "เริ่มต้น"
      options:
        - "08:00 น."
        - "08:30 น."
        - "09:00 น."
        - "09:30 น."
        - "10:00 น."
        - "10:30 น."
        - "11:00 น."
        - "11:30 น."
        - "12:00 น."
        - "12:30 น."
        - "13:00 น."
        - "13:30 น."
        - "14:00 น."
        - "14:30 น."
        - "15:00 น."
        - "15:30 น."
        - "16:00 น."
        - "16:30 น."
        - "17:00 น."
    validations:
      required: true

  - type: dropdown
    id: end_time
    attributes:
      label: ⏰ 2. เลือกเวลาที่ต้องการ "สิ้นสุด" (กรุณาเลือกให้ห่างจากเวลาเริ่มต้นไม่เกิน 2 ชั่วโมง)
      options:
        - "09:00 น."
        - "09:30 น."
        - "10:00 น."
        - "10:30 น."
        - "11:00 น."
        - "11:30 น."
        - "12:00 น."
        - "12:30 น."
        - "13:00 น."
        - "13:30 น."
        - "14:00 น."
        - "14:30 น."
        - "15:00 น."
        - "15:30 น."
        - "16:00 น."
        - "16:30 น."
        - "17:00 น."
        - "17:30 น."
        - "18:00 น."
    validations:
      required: true

  - type: input
    id: requester
    attributes:
      label: 👤 ชื่อผู้จอง / ฝ่ายงาน / คณะ
      placeholder: "ตัวอย่าง: พยาบาลวิชาชีพจบใหม่ ฝ่ายการพยาบาล / นักศึกษา"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: 📝 วัตถุประสงค์การใช้งาน / รายชื่อผู้เข้าร่วม
      placeholder: "ระบุหัวข้อการประชุม, กิจกรรมที่จัด หรือรายชื่อกลุ่มผู้ใช้งาน..."
    validations:
      required: false
